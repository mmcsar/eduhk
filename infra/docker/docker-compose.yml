version: '3.9'

services:
  # ========== API GATEWAY ==========
  api-gateway:
    build:
      context: ../../services/api-gateway
      dockerfile: ../../infra/docker/Dockerfile.node
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - PORT=8080
      - AUTH_SERVICE_URL=http://auth-service:3001
      - MISSION_SERVICE_URL=http://mission-service:3002
      - TRACKING_SERVICE_URL=http://tracking-service:3003
      - PAYMENT_SERVICE_URL=http://payment-service:3004
      - MARKETPLACE_SERVICE_URL=http://marketplace-service:3005
    depends_on:
      - auth-service
      - tracking-service
      - payment-service
    networks:
      - tmsa-network

  # ========== AUTH SERVICE ==========
  auth-service:
    build:
      context: ../../services/auth-service
      dockerfile: ../../infra/docker/Dockerfile.node
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - MONGODB_URI=mongodb://mongo:27017/tmsa-auth
      - JWT_SECRET=dev-jwt-secret
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongo
      - redis
    networks:
      - tmsa-network

  # ========== TRACKING SERVICE ==========
  tracking-service:
    build:
      context: ../../services/tracking-service
      dockerfile: ../../infra/docker/Dockerfile.node
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - PORT=3003
      - MONGODB_URI=mongodb://mongo:27017/tmsa-tracking
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongo
      - redis
    networks:
      - tmsa-network

  # ========== PAYMENT SERVICE ==========
  payment-service:
    build:
      context: ../../services/payment-service
      dockerfile: ../../infra/docker/Dockerfile.node
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - PORT=3004
      - MONGODB_URI=mongodb://mongo:27017/tmsa-payments
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - CINETPAY_API_KEY=${CINETPAY_API_KEY}
    depends_on:
      - mongo
    networks:
      - tmsa-network

  # ========== WEB APP ==========
  web:
    build:
      context: ../../apps/web
      dockerfile: ../../infra/docker/Dockerfile.nextjs
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_WS_URL=http://localhost:8080
    depends_on:
      - api-gateway
    networks:
      - tmsa-network

  # ========== DATABASES ==========
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    networks:
      - tmsa-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - tmsa-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=tmsa
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=tmsa
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - tmsa-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tmsa"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== MESSAGE QUEUE ==========
  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - tmsa-network

  # ========== MONITORING ==========
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - tmsa-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - tmsa-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - tmsa-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - tmsa-network

volumes:
  mongo-data:
  redis-data:
  postgres-data:
  kafka-data:
  prometheus-data:
  grafana-data:
  elasticsearch-data:

networks:
  tmsa-network:
    driver: bridge
