<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Edit Note - MVP Notes</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Edit Note</h1>
      <form method="post" action="/notes/{{ note.id }}/edit">
        <label>Title
          <input type="text" name="title" value="{{ note.title }}" required />
        </label>
        <label>Content
          <textarea name="content" rows="8">{{ note.content }}</textarea>
        </label>
        <button type="submit">Save</button>
        <a class="button" href="/notes">Cancel</a>
      </form>
    </main>
  </body>
</html>
