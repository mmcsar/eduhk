<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Your Notes - MVP Notes</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="row between">
        <h1>Your Notes</h1>
        <form method="post" action="/logout">
          <button type="submit">Logout</button>
        </form>
      </header>

      <p><a class="button" href="/notes/create">New note</a></p>

      <ul class="notes">
        {% for note in notes %}
          <li>
            <a href="/notes/{{ note.id }}/edit"><strong>{{ note.title }}</strong></a>
            <form method="post" action="/notes/{{ note.id }}/delete" class="inline">
              <button type="submit">Delete</button>
            </form>
          </li>
        {% else %}
          <li>No notes yet.</li>
        {% endfor %}
      </ul>
    </main>
  </body>
</html>
